name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: beadc3a4adbe2785008d7cdd7972404b
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: beadc3a4adbe2785008d7cdd7972404b
          command: pages deploy . --project-name dollar-per-second --branch ${{ github.ref_name }}
