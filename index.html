<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dollar Per Second</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtle: #888888;
      --accent: #2d7a4f;
      --border: #e5e5e5;
      --placeholder: #cccccc;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
    }

    /* ── Shared centering wrapper ── */
    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .screen.hidden {
      display: none;
    }

    /* ── Input screen ── */
    #input-screen label {
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 1rem;
      display: block;
      text-align: center;
    }

    #salary-input {
      font-size: 2rem;
      font-family: var(--font-sans);
      border: none;
      border-bottom: 2px solid var(--text);
      outline: none;
      text-align: center;
      width: 100%;
      max-width: 320px;
      padding: 0.5rem 0;
      background: transparent;
      color: var(--text);
      /* hide browser spinner arrows */
      -moz-appearance: textfield;
    }
    #salary-input::-webkit-outer-spin-button,
    #salary-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    #salary-input::placeholder {
      color: var(--placeholder);
    }

    #start-btn {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: opacity 0.2s;
    }
    #start-btn:hover { opacity: 0.75; }

    /* ── Counter screen ── */
    #counter-screen {
      gap: 0.5rem;
    }

    #earned {
      font-family: var(--font-mono);
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #since-label {
      font-size: 0.8125rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 2.5rem;
    }

    #stats {
      display: flex;
      gap: 2.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.25rem;
      font-family: var(--font-mono);
      color: var(--text);
    }

    .stat-label {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    /* ── Reset link ── */
    #reset-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    #reset-btn:hover { color: var(--text); }
  </style>
</head>
<body>
  <!-- Input screen -->
  <div id="input-screen" class="screen">
    <label for="salary-input">Your yearly salary</label>
    <input
      id="salary-input"
      type="number"
      placeholder="100000"
      min="1"
      autocomplete="off"
    />
    <button id="start-btn">Start</button>
  </div>

  <!-- Counter screen -->
  <div id="counter-screen" class="screen hidden">
    <div id="earned">$0.00</div>
    <div id="since-label">earned since January 1</div>

    <div id="stats">
      <div class="stat">
        <span class="stat-value" id="per-day">—</span>
        <span class="stat-label">per day</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="per-hour">—</span>
        <span class="stat-label">per hour</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="per-minute">—</span>
        <span class="stat-label">per minute</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="per-second">—</span>
        <span class="stat-label">per second</span>
      </div>
    </div>
  </div>

  <button id="reset-btn" class="hidden">start over</button>

  <script>
    const inputScreen  = document.getElementById('input-screen');
    const counterScreen = document.getElementById('counter-screen');
    const salaryInput  = document.getElementById('salary-input');
    const startBtn     = document.getElementById('start-btn');
    const resetBtn     = document.getElementById('reset-btn');
    const earnedEl     = document.getElementById('earned');
    const perDayEl     = document.getElementById('per-day');
    const perHourEl    = document.getElementById('per-hour');
    const perMinEl     = document.getElementById('per-minute');
    const perSecEl     = document.getElementById('per-second');

    let intervalId = null;

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function startCounter(salary) {
      const now = new Date();
      const startOfYear = new Date(now.getFullYear(), 0, 1); // Jan 1, 00:00:00
      const perSecond = salary / 365 / 24 / 3600;

      // Static derived rates
      perDayEl.textContent  = fmt(salary / 365);
      perHourEl.textContent = fmt(salary / 365 / 24);
      perMinEl.textContent  = fmt(salary / 365 / 24 / 60);
      perSecEl.textContent  = fmt(salary / 365 / 24 / 3600);

      // Live counter
      function tick() {
        const secondsElapsed = (Date.now() - startOfYear.getTime()) / 1000;
        earnedEl.textContent = fmt(secondsElapsed * perSecond);
      }

      tick(); // immediate first render
      intervalId = setInterval(tick, 100);
    }

    function showCounter(salary) {
      inputScreen.classList.add('hidden');
      counterScreen.classList.remove('hidden');
      resetBtn.classList.remove('hidden');
      startCounter(salary);
    }

    function reset() {
      clearInterval(intervalId);
      intervalId = null;
      counterScreen.classList.add('hidden');
      resetBtn.classList.add('hidden');
      inputScreen.classList.remove('hidden');
      salaryInput.value = '';
      salaryInput.focus();
    }

    function handleStart() {
      const salary = parseFloat(salaryInput.value);
      if (!salary || salary <= 0) {
        salaryInput.focus();
        return;
      }
      showCounter(salary);
    }

    startBtn.addEventListener('click', handleStart);

    salaryInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleStart();
    });

    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
