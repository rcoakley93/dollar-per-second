<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dollar Per Second</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #111111;
      --subtle: #888888;
      --accent: #2d7a4f;
      --border: #e5e5e5;
      --placeholder: #cccccc;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
    }

    /* ── Shared centering wrapper ── */
    .screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .screen.hidden {
      display: none;
    }

    /* ── Input screen ── */
    #input-screen label {
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 1rem;
      display: block;
      text-align: center;
    }

    #salary-input {
      font-size: 2rem;
      font-family: var(--font-sans);
      border: none;
      border-bottom: 2px solid var(--text);
      outline: none;
      text-align: center;
      width: 100%;
      max-width: 320px;
      padding: 0.5rem 0;
      background: transparent;
      color: var(--text);
      /* hide browser spinner arrows */
      -moz-appearance: textfield;
    }
    #salary-input::-webkit-outer-spin-button,
    #salary-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    #salary-input::placeholder {
      color: var(--placeholder);
    }

    #start-btn {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: opacity 0.2s;
    }
    #start-btn:hover { opacity: 0.75; }

    /* ── Counter screen ── */
    #counter-screen {
      gap: 0.5rem;
    }

    #earned {
      font-family: var(--font-mono);
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #since-label {
      font-size: 0.8125rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 2.5rem;
    }

    #stats {
      display: flex;
      gap: 2.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.25rem;
      font-family: var(--font-mono);
      color: var(--text);
    }

    .stat-label {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    /* ── Reset link ── */
    #reset-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    #reset-btn:hover { color: var(--text); }

    /* ── Compare button ── */
    #compare-btn {
      margin-top: 2rem;
      padding: 0.6rem 1.5rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: none;
      color: var(--subtle);
      border: 1px dashed var(--border);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: color 0.2s, border-color 0.2s;
    }
    #compare-btn:hover { color: var(--text); border-color: var(--text); }

    /* ── Comparisons section ── */
    #comparisons {
      width: 100%;
      max-width: 760px;
      margin-top: 2rem;
    }
    #comparisons-header {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    #comparisons-cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .comp-card {
      border: 1px solid var(--border);
      padding: 1rem;
      min-width: 140px;
      flex: 1;
      max-width: 220px;
    }
    .comp-card-label {
      font-size: 0.6375rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 0.75rem;
      text-align: center;
    }
    .comp-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .comp-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }
    .comp-stat-value {
      font-size: 0.8125rem;
      font-family: var(--font-mono);
      color: var(--text);
    }
    .comp-stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--subtle);
    }

    /* ── Library modal ── */
    #library-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #library-modal.hidden { display: none; }
    #library-panel {
      background: var(--bg);
      width: 100%;
      max-width: 640px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #library-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #library-count {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--subtle);
    }
    #library-title {
      font-size: 0.875rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }
    #library-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--subtle);
      font-family: var(--font-sans);
      line-height: 1;
      padding: 0.25rem;
    }
    #library-close:hover { color: var(--text); }
    #library-grid {
      overflow-y: auto;
      flex: 1;
      padding: 1rem 1.25rem;
    }
    .lib-category {
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--subtle);
      margin: 1.25rem 0 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid var(--border);
    }
    .lib-category:first-child { margin-top: 0; }
    .lib-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    @media (max-width: 480px) {
      .lib-cards { grid-template-columns: repeat(2, 1fr); }
    }
    .lib-card {
      border: 1px solid var(--border);
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }
    .lib-card:hover:not(.maxed) { border-color: var(--text); }
    .lib-card.selected { border-color: var(--accent); }
    .lib-card.maxed { opacity: 0.4; pointer-events: none; }
    .lib-card.selected.maxed { opacity: 1; pointer-events: auto; }
    .lib-card-check {
      position: absolute;
      top: 0.3rem;
      right: 0.4rem;
      font-size: 0.65rem;
      color: var(--accent);
      display: none;
    }
    .lib-card.selected .lib-card-check { display: block; }
    .lib-card-name {
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 0.35rem;
      padding-right: 0.75rem;
      line-height: 1.3;
    }
    .lib-card-day {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--accent);
    }
    .lib-card-sub {
      font-size: 0.6rem;
      font-family: var(--font-mono);
      color: var(--subtle);
      margin-top: 0.1rem;
    }
    #library-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #library-add-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.8125rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: opacity 0.2s;
    }
    #library-add-btn:hover { opacity: 0.75; }
    #library-add-btn.empty { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <!-- Input screen -->
  <div id="input-screen" class="screen">
    <label for="salary-input">Your yearly salary</label>
    <input
      id="salary-input"
      type="number"
      placeholder="100000"
      min="1"
      autocomplete="off"

    <button id="start-btn">Start</button>

  <!-- Counter screen -->

    <div id="earned">$0.00</div>
    <div id="since-label">earned since January 1</div>

    <div id="stats">
      <div class="stat">
        <span class="stat-value" id="per-day">—</span>
        <span class="stat-label">per day</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="per-hour">—</span>
        <span class="stat-label">per hour</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="per-minute">—</span>
        <span class="stat-label">per minute</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="per-second">—</span>
        <span class="stat-label">per second</span>
      </div>
    </div>

    <button id="compare-btn">+ Add Comparison Card</button>

    <div id="comparisons" class="hidden">
      <div id="comparisons-header">Comparisons</div>
      <div id="comparisons-cards"></div>
    </div>
  </div>

  <button id="reset-btn" class="hidden">start over</button>

  <!-- Comparison library modal -->

    ];

    const inputScreen  = document.getElementById('input-screen');
    const counterScreen = document.getElementById('counter-screen');
    const salaryInput  = document.getElementById('salary-input');
    const startBtn     = document.getElementById('start-btn');
    const resetBtn     = document.getElementById('reset-btn');
    const earnedEl     = document.getElementById('earned');
    const perDayEl     = document.getElementById('per-day');
    const perHourEl    = document.getElementById('per-hour');
    const perMinEl     = document.getElementById('per-minute');
    const perSecEl        = document.getElementById('per-second');
    const compareBtnEl    = document.getElementById('compare-btn');
    const comparisonsEl   = document.getElementById('comparisons');
    const comparisonsCards = document.getElementById('comparisons-cards');
    const comparisonsHeader = document.getElementById('comparisons-header');
    const libraryModalEl  = document.getElementById('library-modal');
    const libraryGridEl   = document.getElementById('library-grid');
    const libraryCountEl  = document.getElementById('library-count');
    const libraryAddBtnEl = document.getElementById('library-add-btn');
    const libraryCloseEl  = document.getElementById('library-close');

    let intervalId = null;
    let selectedIds = new Set(); // max 3

    function fmt(n) {
      return '$' + n.toLocaleString('en-US', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function fmtSec(n) {
      const decimals = n >= 0.01 ? 2 : Math.ceil(-Math.log10(n)) + 2;
      return '$' + n.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function calcRates(salary) {
      return {
        day:    salary / 365,
        hour:   salary / 365 / 24,
        minute: salary / 365 / 24 / 60,
        second: salary / 365 / 24 / 3600,
      };
    }

    function fmtSmall(n) {
      // compact formatter for library cards and comparison cards
      if (n >= 1000) return '$' + Math.round(n).toLocaleString('en-US');
      if (n >= 100)  return '$' + n.toFixed(0);
      if (n >= 1)    return '$' + n.toFixed(2);
      return fmtSec(n);
    }

    function openLibrary() {
      libraryModalEl.classList.remove('hidden');
      renderLibrary();
    }

    function closeLibrary() {
      libraryModalEl.classList.add('hidden');
    }

    function renderLibrary() {
      const atMax = selectedIds.size >= 3;
      libraryCountEl.textContent = LIBRARY.length + ' options available';
      libraryAddBtnEl.textContent = 'Add to My List (' + selectedIds.size + ' / 3)';
      libraryAddBtnEl.classList.toggle('empty', selectedIds.size === 0);

      // Group by category
      const grouped = {};
      LIBRARY.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      let html = '';
      Object.keys(grouped).forEach(cat => {
        html += '<div class="lib-category">' + cat + '</div>';
        html += '<div class="lib-cards">';
        grouped[cat].forEach(item => {
          const rates = calcRates(item.salary);
          const isSelected = selectedIds.has(item.id);
          const isMaxed = atMax && !isSelected;
          const classes = 'lib-card' + (isSelected ? ' selected' : '') + (isMaxed ? ' maxed' : '');
          html += '<div class="' + classes + '" data-id="' + item.id + '">';
          html += '<span class="lib-card-check">✓</span>';
          html += '<div class="lib-card-name">' + item.label + '</div>';
          html += '<div class="lib-card-day">' + fmtSmall(rates.day) + '/day</div>';
          html += '<div class="lib-card-sub">' + fmtSmall(rates.hour) + '/hr &nbsp; ' + fmtSmall(rates.minute) + '/min</div>';
          html += '</div>';
        });
        html += '</div>';
      });

      libraryGridEl.innerHTML = html;

      // Attach click listeners
      libraryGridEl.querySelectorAll('.lib-card').forEach(card => {
        card.addEventListener('click', function() {
          const id = parseInt(this.dataset.id, 10);
          toggleSelection(id);
        });
      });
    }

    function toggleSelection(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else if (selectedIds.size < 3) {
        selectedIds.add(id);
      }
      renderLibrary();
    }

    function confirmSelection() {
      closeLibrary();
      renderComparisons();
    }

    function renderComparisons() {
      if (selectedIds.size === 0) {
        comparisonsEl.classList.add('hidden');
        return;
      }

      const atMax = selectedIds.size >= 3;
      comparisonsHeader.textContent = atMax ? 'Comparisons (Max 3 reached)' : 'Comparisons';

      let html = '';
      selectedIds.forEach(id => {
        const item = LIBRARY.find(x => x.id === id);
        if (!item) return;
        const r = calcRates(item.salary);
        html += '<div class="comp-card">';
        html += '<div class="comp-card-label">' + item.label + '</div>';
        html += '<div class="comp-stats">';
        html += '<div class="comp-stat"><span class="comp-stat-value">' + fmt(r.day) + '</span><span class="comp-stat-label">per day</span></div>';
        html += '<div class="comp-stat"><span class="comp-stat-value">' + fmt(r.hour) + '</span><span class="comp-stat-label">per hour</span></div>';
        html += '<div class="comp-stat"><span class="comp-stat-value">' + fmt(r.minute) + '</span><span class="comp-stat-label">per min</span></div>';
        html += '<div class="comp-stat"><span class="comp-stat-value">' + fmtSec(r.second) + '</span><span class="comp-stat-label">per sec</span></div>';
        html += '</div></div>';
      });

      comparisonsCards.innerHTML = html;
      comparisonsEl.classList.remove('hidden');
    }

    function startCounter(salary) {
      const now = new Date();
      const startOfYear = new Date(now.getFullYear(), 0, 1); // Jan 1, 00:00:00
      const perSecond = salary / 365 / 24 / 3600;

      // Static derived rates
      perDayEl.textContent  = fmt(salary / 365);
      perHourEl.textContent = fmt(salary / 365 / 24);
      perMinEl.textContent  = fmt(salary / 365 / 24 / 60);
      perSecEl.textContent  = fmtSec(salary / 365 / 24 / 3600);

      // Live counter
      function tick() {
        const secondsElapsed = (Date.now() - startOfYear.getTime()) / 1000;
        earnedEl.textContent = fmt(secondsElapsed * perSecond);
      }

      tick(); // immediate first render
      intervalId = setInterval(tick, 100);
    }

    function showCounter(salary) {
      inputScreen.classList.add('hidden');
      counterScreen.classList.remove('hidden');
      resetBtn.classList.remove('hidden');
      startCounter(salary);
    }

    function reset() {
      clearInterval(intervalId);
      intervalId = null;
      selectedIds.clear();
      comparisonsEl.classList.add('hidden');
      comparisonsCards.innerHTML = '';
      counterScreen.classList.add('hidden');
      resetBtn.classList.add('hidden');
      inputScreen.classList.remove('hidden');
      salaryInput.value = '';
      salaryInput.focus();
    }

    function handleStart() {
      const salary = parseFloat(salaryInput.value);
      if (!salary || salary <= 0) {
        salaryInput.focus();
        return;
      }
      showCounter(salary);
    }

    startBtn.addEventListener('click', handleStart);

    salaryInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleStart();
    });

    resetBtn.addEventListener('click', reset);

    compareBtnEl.addEventListener('click', openLibrary);
    libraryCloseEl.addEventListener('click', closeLibrary);
    libraryAddBtnEl.addEventListener('click', function() {
      if (selectedIds.size > 0) confirmSelection();
    });
    libraryModalEl.addEventListener('click', function(e) {
      if (e.target === libraryModalEl) closeLibrary();
    });
  </script>
</body>
</html>
